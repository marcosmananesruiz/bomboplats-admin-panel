<header class="main_header">
  <div class="brand">
    <h1 (click)="reiniciarPagina()">Bomboplats Admin Panel</h1>
  </div>
  <div class="header-actions">
    <button class="btn" (click)="mostrarElementAdder()">Añadir</button>
    <button class="btn" (click)="mostrarElementDisplay()">Mostrar</button>
    <button class="btn" (click)="mostrarElementEditor()">Editar</button>
  </div>
</header>
<main class="main-layout">
  @if (esPaginaIniciar()) {
    <section class="welcome-card">
      <h2>Bomboplats Admin Panel</h2>
      <p>Bienvenido, selecciona una acción en el encabezado para comenzar.</p>
    </section>
  } @else {
    @if (elementDisplay) {
      <app-display-container></app-display-container>
    }
    @if (elementAdder) {
      <app-adder-container></app-adder-container>
    }
    @if (elementEditor) {
      <app-editor-container></app-editor-container>
    }
  }
</main>
